<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Privacy Policies</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7faf8;
      --surface: #ffffff;
      --text: #17201a;
      --muted: #5c675f;
      --line: #dce6df;
      --accent: #1769aa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(860px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    header {
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 36px;
      line-height: 1.2;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
    }

    nav {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      display: block;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
    }

    a span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    a:focus,
    a:hover {
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Privacy Policies</h1>
      <p>앱별 개인정보처리방침을 확인할 수 있습니다.</p>
    </header>

    <nav aria-label="Privacy policy links">
      <a href="./CountFit/">CountFit <span>개인정보처리방침</span></a>
      <a href="./TinyDuckRun/">TinyDuckRun <span>개인정보처리방침</span></a>
      <a href="./FairMatch/">FairMatch <span>개인정보처리방침</span></a>
      <a href="./FairMatch/en.html">FairMatch English <span>Privacy Policy</span></a>
    </nav>
  </main>
</body>
</html>
